name: aninode_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  html: ^0.15.6
  graphql_flutter: ^5.3.0
  flutter_riverpod: ^3.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^11.0.0
  flutter_spinkit: ^5.2.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.2
  crypto: ^3.0.7
  encrypt: ^5.0.3
  connectivity_plus: ^7.1.1
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.1
  flutter_distributor: ^0.0.2
  flutter_lints: ^6.0.0

msix_config:
  display_name: AniNode
  publisher_display_name: AmbitDev
  identity_name: com.ambitdev.aninode
  publisher: CN=AmbitDev
  logo_path: assets/images/launcher_icon.png
  start_menu_icon_path: assets/images/launcher_icon.png
  tile_icon_path: assets/images/launcher_icon.png
  vs_generated_images_folder_path: assets/images/
  icons_background_color: "#0F1117"
  architecture: x64
  capabilities: internetClient, internetClientServer, privateNetworkClientServer
  languages: en-us
  install_certificate: false
  output_name: AniNode-Setup
  output_path: build\windows\msix

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icon.png"
  min_sdk_android: 21 


flutter:
  uses-material-design: true
