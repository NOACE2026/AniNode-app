output: dist
releases:
  - name: dev
    jobs:
      - name: release-linux-deb
        package:
          platform: linux
          target: deb
        build_args:
          - --release
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage
        build_args:
          - --release
      - name: release-windows-msix
        package:
          platform: windows
          target: msix
        build_args:
          - --release
      - name: release-ios-ipa
        package:
          platform: ios
          target: ipa
        build_args:
          - --release
          - --no-codesign
