output: dist
releases:
  - name: dev
    jobs:
      - name: linux-deb
        package:
          platform: linux
          target: deb
        build_args:
          release: true
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
        build_args:
          release: true
      - name: windows-msix
        package:
          platform: windows
          target: msix
        build_args:
          release: true
      - name: ios-ipa
        package:
          platform: ios
          target: ipa
        build_args:
          release: true
          no-codesign: true
