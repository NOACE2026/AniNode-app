name: Build Releases

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libmpv-dev pkg-config cmake ninja-build

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build and Package Linux
        run: |
          dart pub global activate flutter_distributor
          dart pub global run flutter_distributor:release --name dev --jobs release-linux-deb,release-linux-appimage --verbose

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: aninode-linux-deb
          path: dist/*/*.deb

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: aninode-linux-appimage
          path: dist/*/*.AppImage

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build and Package Windows
        run: |
          dart pub global activate flutter_distributor
          dart pub global run flutter_distributor:release --name dev --jobs release-windows-msix --verbose

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: aninode-windows-msix
          path: dist/*/*.msix

  build-ios:
    name: Build iOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build and Package iOS
        run: |
          dart pub global activate flutter_distributor
          dart pub global run flutter_distributor:release --name dev --jobs release-ios-ipa --verbose

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: aninode-ios-ipa
          path: dist/*/*.ipa
